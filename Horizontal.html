<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos Verticales</title>
    <link rel="stylesheet" href="/edicion.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="/Logo.ico" type="ico">
    <script src="https://kit.fontawesome.com/14b1b88f84.js" crossorigin="anonymous"></script>
</head>
<body>

  <section class="Amia-porfolio">
    <div class="cerrar">
      <a href="/Video.html"> <i class="fa-solid fa-arrow-left"></i> </a> 
    </div>

    <div class="contenedor-videos">
      <div class="video-item js-video" data-id="kdLQUQA8meU"></div>
      <div class="video-item js-video" data-id="z3_vaglotYo"></div>
      <div class="video-item js-video" data-id="baIcmv61foI"></div>
      <div class="video-item js-video" data-id="yCeUwRWJO54"></div>
      <div class="video-item js-video" data-id="V9g5-ykKICc"></div>
      <div class="video-item js-video" data-id="ckqM_1Wawoo"></div>

    </div>
  </section>

  <script>
    document.querySelectorAll('.js-video').forEach(el => {
      const id = el.getAttribute('data-id');
      // Ponemos la miniatura de YouTube como fondo
      el.style.backgroundImage = `url(https://img.youtube.com/vi/${id}/maxresdefault.jpg)`;
      
      // Añadimos el botón de Play visual
      el.innerHTML = '<div class="play-btn"><i class="fa-solid fa-play"></i></div>';

      el.addEventListener('click', function() {
        this.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        this.classList.add('video-playing');
      });
    });
  </script>
</body>
</html>
